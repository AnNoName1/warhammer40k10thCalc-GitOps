apiVersion: v1
kind: List
items:
# 1. Ingress Nginx (Helm-chart)
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: ingress-nginx
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: https://kubernetes.github.io/ingress-nginx
      targetRevision: 4.10.0
      chart: ingress-nginx
    destination:
      server: https://kubernetes.default.svc
      namespace: ingress-nginx
    syncPolicy:
      automated: {prune: true, selfHeal: true}
      syncOptions: [CreateNamespace=true]

# 2. MetalLB (Manifests)
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: metallb
    namespace: argocd
    labels:
      argocd.argoproj.io/instance: root
    annotations:
      argocd.argoproj.io/sync-wave: "0"
  spec:
    project: default
    destination:
      server: https://kubernetes.default.svc
      namespace: metallb-system
    source:
      repoURL: https://metallb.github.io/metallb
      chart: metallb
      targetRevision: 0.14.8
      helm:
        values: |
          speaker:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
          controller:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true

- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: metallb-config
    namespace: argocd
    labels:
      argocd.argoproj.io/instance: root
    annotations:
      argocd.argoproj.io/sync-wave: "1"
  spec:
    project: default
    destination:
      server: https://kubernetes.default.svc
      namespace: metallb-system
    source:
      repoURL: https://github.com/AnNoName1/warhammer40k10thCalc-GitOps
      targetRevision: HEAD
      path: cluster-config/infra/metallb
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true

# 3. Kyverno (Safety policies)
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: kyverno-engine
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: https://kyverno.github.io/kyverno/
      chart: kyverno
      targetRevision: 3.2.0
    destination:
      server: https://kubernetes.default.svc
      namespace: kyverno
    syncPolicy:
      automated: {prune: true, selfHeal: true}
      syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # Чтобы не было ошибки "Too long"
# 4. Kyverno Policies
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: kyverno-policies
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: https://github.com/AnNoName1/warhammer40k10thCalc-GitOps.git
      targetRevision: HEAD
      path: cluster-config/infra/kyverno
    destination:
      server: https://kubernetes.default.svc
      namespace: default
    syncPolicy:
      automated: {prune: true, selfHeal: true}
      syncOptions:
      - ServerSideApply=true

# 5. Monitoring (Prometheus)
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: monitoring
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: https://github.com/AnNoName1/warhammer40k10thCalc-GitOps.git
      targetRevision: HEAD
      path: cluster-config/infra/monitoring
    destination:
      server: https://kubernetes.default.svc
      namespace: monitoring
    syncPolicy:
      automated: {prune: true, selfHeal: true}
      syncOptions: [CreateNamespace=true]