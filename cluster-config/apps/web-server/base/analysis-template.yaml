apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
spec:
  metrics:
  - name: success-rate
    interval: 5m
    successCondition: result[0] >= 0.95
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:80
        query: |
          sum(rate(
            nginx_ingress_controller_requests{status!~"5.*", ingress="warhammer40k10thcalc-web"}[5m]
          )) / 
          sum(rate(
            nginx_ingress_controller_requests{ingress="warhammer40k10thcalc-web"}[5m]
          ))
  args:
  - name: service-name