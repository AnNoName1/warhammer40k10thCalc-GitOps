replicas: 6

rollout:
  enabled: true
  maxSurge: 1
  maxUnavailable: 0
  steps:
    - setWeight: 10
    - pause:
        duration: 60
    - setWeight: 30
    - pause:
        duration: 120
    - setWeight: 60
    - pause:
        duration: 180
    - setWeight: 100
  trafficRouting:
    nginx:
      enabled: true
      ingressClassName: nginx

analysis:
  enabled: true
  templateName: web-server-success-rate

ingress:
  host: calc.warhammer40k.ru
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"